name: Publish

# Validate every JSON manifest against its schema, then — only on main —
# publish the app-fetched JSON to Cloudflare R2. Binaries are uploaded and
# HEAD-verified by the Microsoft refresh workflow before its catalog PR opens;
# JSON-only publication refuses to commit the v1 index if any blob is missing.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate JSON against schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          # pnpm 11.12.0 currently breaks action-setup's self-installer:
          # https://github.com/pnpm/action-setup/issues/276
          version: 11.11.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MICROSOFT_NUGET_BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'HEAD^' }}

  publish:
    name: Publish immutable snapshots and index to R2
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          # pnpm 11.12.0 currently breaks action-setup's self-installer:
          # https://github.com/pnpm/action-setup/issues/276
          version: 11.11.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Publish to R2 (JSON only)
        run: pnpm run publish:json
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
